name: Run Tests

on:
  pull_request:
    branches:
      - develop

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: asdf-vm/actions/install@v4
        with:
          tool_versions: |
            nodejs 16.20.2
            nodejs 18.20.8
            nodejs 20.19.5
            nodejs 22.19.0
            nodejs 22.19.0
            nodejs 24.7.0
            bun 1.2.21
            deno 2.4.5
      - name: Install dependencies
        run: bun install
      - name: Run tests
        run: bun test
